<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>MobilaAlex.ro</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Poppins',sans-serif;
      background:#f5f5f5;
      color:#111;
    }

    header{
      background:#111;
      color:white;
      padding:20px 5%;
      display:flex;
      justify-content:space-between;
      align-items:center;
      position:sticky;
      top:0;
      z-index:999;
    }

    .logo{
      font-size:30px;
      font-weight:700;
    }

    .logo span{
      color:#d4af37;
    }

    nav{
      display:flex;
      gap:20px;
    }

    nav a{
      color:white;
      text-decoration:none;
      transition:0.3s;
      font-weight:500;
    }

    nav a:hover{
      color:#d4af37;
    }

    .hero{
      height:85vh;
      background:
      linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),
      url('https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?q=80&w=1600&auto=format&fit=crop')
      center/cover;

      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      color:white;
      padding:30px;
    }

    .hero-content{
      max-width:900px;
    }

    .hero h1{
      font-size:64px;
      margin-bottom:20px;
    }

    .hero p{
      font-size:22px;
      line-height:1.8;
      margin-bottom:35px;
    }

    .hero-btn{
      display:inline-block;
      padding:16px 34px;
      background:#d4af37;
      color:black;
      border-radius:50px;
      text-decoration:none;
      font-weight:600;
      transition:0.3s;
    }

    .hero-btn:hover{
      transform:translateY(-3px);
    }

    .category-section{
      padding:80px 5%;
    }

    .section-title{
      font-size:42px;
      margin-bottom:40px;
      text-align:center;
    }

    .products-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:30px;
    }

    .product-card{
      background:white;
      border-radius:24px;
      overflow:hidden;
      box-shadow:0 10px 25px rgba(0,0,0,0.08);
      transition:0.3s;
    }

    .product-card:hover{
      transform:translateY(-8px);
    }

    .product-card img{
      width:100%;
      height:260px;
      object-fit:cover;
    }

    .product-info{
      padding:24px;
    }

    .product-title{
      font-size:18px;
      font-weight:600;
      margin-bottom:14px;
      min-height:60px;
    }

    .product-price{
      color:#d4af37;
      font-size:28px;
      font-weight:700;
      margin-bottom:20px;
    }

    .whatsapp-btn{
      display:flex;
      justify-content:center;
      align-items:center;
      width:100%;
      padding:14px;
      border-radius:50px;
      text-decoration:none;
      background:#25D366;
      color:white;
      font-weight:600;
      transition:0.3s;
    }

    .whatsapp-btn:hover{
      background:#1fb65a;
    }

    footer{
      background:#111;
      color:white;
      text-align:center;
      padding:40px;
      margin-top:50px;
    }

    .floating-whatsapp{
      position:fixed;
      right:20px;
      bottom:20px;
      width:65px;
      height:65px;
      background:#25D366;
      border-radius:50%;
      display:flex;
      justify-content:center;
      align-items:center;
      box-shadow:0 10px 25px rgba(0,0,0,0.25);
      z-index:9999;
    }

    .floating-whatsapp img{
      width:34px;
    }

    @media(max-width:768px){

      nav{
        display:none;
      }

      .hero h1{
        font-size:42px;
      }

      .hero p{
        font-size:18px;
      }

    }

  </style>

</head>

<body>

<header>

  <div class="logo">
    Mobila<span>Alex</span>.ro
  </div>

  <nav>
    <a href="#dormitoare">Dormitoare</a>
    <a href="#bucatarii">Bucătării</a>
    <a href="#paturi">Paturi</a>
    <a href="#dulapuri">Dulapuri</a>
  </nav>

</header>

<section class="hero">

  <div class="hero-content">

    <h1>Mobilă Modernă Pentru Casa Ta</h1>

    <p>
      Dormitoare, bucătării, paturi și dulapuri moderne la prețuri excelente.
    </p>

    <a class="hero-btn"
       href="https://wa.me/40757477926">

       Comandă pe WhatsApp

    </a>

  </div>

</section>

<div id="content"></div>

<footer>

  © 2026 MobilaAlex.ro • 0757 477 926

</footer>

<a class="floating-whatsapp"
   href="https://wa.me/40757477926">

  <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">

</a>

<script>

const categories = [

  {
    id:'dormitoare',
    title:'Dormitoare',
    files:[
      'json/dormitoare/dormitor-clio.json',
      'json/dormitoare/dormitor-eva.json',
      'json/dormitoare/dormitor-filip.json',
      'json/dormitoare/dormitor-sofia.json',
      'json/dormitoare/dormitor-eric-250.json',
      'json/dormitoare/dormitor-imperial.json'
    ]
  },

  {
    id:'bucatarii',
    title:'Bucătării',
    files:[
      'json/bucatarii/bucatarii.json'
    ]
  },

  {
    id:'paturi',
    title:'Paturi',
    files:[
      'json/paturi/paturi.json'
    ]
  },

  {
    id:'dulapuri',
    title:'Dulapuri',
    files:[
      'json/dulapuri/dulapuri.json'
    ]
  }

];

async function loadCategory(category){

  const content = document.getElementById('content');

  const section = document.createElement('section');

  section.className = 'category-section';

  section.id = category.id;

  section.innerHTML = `
  
    <h2 class="section-title">${category.title}</h2>

    <div class="products-grid" id="${category.id}-grid"></div>

  `;

  content.appendChild(section);

  const grid = document.getElementById(`${category.id}-grid`);

  for(const file of category.files){

    try{

      const response = await fetch(file);

      const products = await response.json();

      products.forEach(product => {

        const title =
          product.Title_URL ||
          product.title ||
          'Produs';

        const image =
          product.Image ||
          product.image ||
          '';

        const price =
          product.Price ||
          product.price ||
          '';

        const card = document.createElement('div');

        card.className = 'product-card';

        card.innerHTML = `

          <img src="${image}" alt="${title}">

          <div class="product-info">

            <div class="product-title">
              ${title}
            </div>

            <div class="product-price">
              ${price}
            </div>

            <a class="whatsapp-btn"
               href="https://wa.me/40757477926?text=Salut,%20sunt%20interesat%20de%20${encodeURIComponent(title)}">

               Comandă pe WhatsApp

            </a>

          </div>

        `;

        grid.appendChild(card);

      });

    }catch(error){

      console.log('Nu s-a putut încărca:',file);

    }

  }

}

categories.forEach(category => {

  loadCategory(category);

});

</script>

</body>
</html>
