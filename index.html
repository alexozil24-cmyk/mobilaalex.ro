  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Poppins',sans-serif;
      background:#f5f5f5;
      color:#111;
    }

    header{
      position:sticky;
      top:0;
      z-index:999;
      background:#111;
      padding:20px 5%;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .logo{
      color:white;
      font-size:32px;
      font-weight:700;
    }

    .logo span{
      color:#d4af37;
    }

    nav{
      display:flex;
      gap:25px;
    }

    nav a{
      color:white;
      text-decoration:none;
      font-weight:500;
      transition:0.3s;
    }

    nav a:hover{
      color:#d4af37;
    }

    .hero{
      height:85vh;
      background:
      linear-gradient(rgba(0,0,0,0.55),rgba(0,0,0,0.55)),
      url('https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?q=80&w=1600&auto=format&fit=crop')
      center/cover;

      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      color:white;
      padding:20px;
    }

    .hero-content{
      max-width:900px;
    }

    .hero h1{
      font-size:64px;
      margin-bottom:20px;
    }

    .hero p{
      font-size:22px;
      line-height:1.7;
      margin-bottom:35px;
    }

    .hero-btn{
      display:inline-block;
      background:#d4af37;
      color:black;
      padding:16px 34px;
      border-radius:50px;
      text-decoration:none;
      font-weight:600;
      transition:0.3s;
    }

    .hero-btn:hover{
      transform:translateY(-3px);
    }

    .category-section{
      padding:80px 5%;
    }

    .section-title{
      text-align:center;
      font-size:42px;
      margin-bottom:45px;
    }

    .products-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:30px;
    }

    .product-card{
      background:white;
      border-radius:24px;
      overflow:hidden;
      box-shadow:0 10px 30px rgba(0,0,0,0.08);
      transition:0.3s;
    }

    .product-card:hover{
      transform:translateY(-8px);
    }

    .product-card img{
      width:100%;
      height:260px;
      object-fit:cover;
      background:#eee;
    }

    .product-info{
      padding:24px;
    }

    .product-title{
      font-size:18px;
      font-weight:600;
      margin-bottom:16px;
      min-height:70px;
    }

    .product-price{
      color:#d4af37;
      font-size:28px;
      font-weight:700;
      margin-bottom:22px;
    }

    .whatsapp-btn{
      display:flex;
      justify-content:center;
      align-items:center;
      width:100%;
      background:#25D366;
      color:white;
      padding:14px;
      border-radius:50px;
      text-decoration:none;
      font-weight:600;
      transition:0.3s;
    }

    .whatsapp-btn:hover{
      background:#1ebc5a;
    }

    footer{
      background:#111;
      color:white;
      text-align:center;
      padding:40px;
      margin-top:40px;
    }

    .floating-whatsapp{
      position:fixed;
      right:20px;
      bottom:20px;
      width:65px;
      height:65px;
      border-radius:50%;
      background:#25D366;
      display:flex;
      justify-content:center;
      align-items:center;
      box-shadow:0 10px 25px rgba(0,0,0,0.25);
      z-index:9999;
    }

    .floating-whatsapp img{
      width:34px;
    }

    @media(max-width:768px){

      nav{
        display:none;
      }

      .hero h1{
        font-size:42px;
      }

      .hero p{
        font-size:18px;
      }

    }

  </style>

</head>

<body>

<script>

const categories = [

  {

      'json/dormitoare/Dormitor Clio _ Pat _ Ușă Tapițate _ 13 Culori Moderne.json',

      'json/dormitoare/Dormitor Cod 150 - Dulap Compact 150cm, Pat și Noptiere Tapițate.json',

      'json/dormitoare/Dormitor Cod 250 _ Pat Tapițat, Dulap 250cm și Noptiere – Culori Diverse.json',

      'json/dormitoare/Dormitor Dante – Disponibil pe Alb, Sonoma sau Wenge, Mai Multe Variante _ AnyMob.json',

      'json/dormitoare/Dormitor Eric cu Extensii - Pat și Noptiere Tapițate _ 13 Culori Diverse.json',

      'json/dormitoare/Dormitor Eric cu Ușă Tapițată, Pat Tapițat și Noptiere Tapițate – Eleganță și Confort _ AnyMob.json',

      'json/dormitoare/Dormitor Eva – Eleganță cu Detalii Aurii și Argintii.json',

      'json/dormitoare/Dormitor Filip cu Pat Tapițat – Eleganță Modernă și Confort.json',

      'json/dormitoare/Dormitor Giulia – Design Elegant în Stejar sau Wenge, Pat 140x200.json',

  },

    ]
  },

  {

    title:'Paturi',
    files:[

      'json/paturi/Pat Tapițat ANY03 – Confort Premium și Design Modern, pe Mai Multe Dimensiuni.json',

      'json/paturi/Pat Tapițat Catifea cu Inserții Aurii VLN - 13 Culori Disponibile.json',

      'json/paturi/Pat Tapițat Filip – Design Elegant și Funcțional, Disponibil în Culori Diverse.json',

      'json/paturi/Pat Tapițat Ianis – Modern, Confortabil, pe Măsura Dormitorului Tău.json',

      'json/paturi/Pat Tapițat Leus.json',

      'json/paturi/Pat Tapițat Luca – Design Elegant, Disponibil pe Culori și Dimensiuni Diverse.json',

      'json/paturi/Saltele Pat 160 x 200 - 140 x 200 - 120 x 200 _ AnyMob.ro.json'

    ]
  },

  {
    id:'dulapuri',
    title:'Dulapuri',
    files:[
      'json/dulapuri/products.json'
    ]
  }

];

async function loadCategory(category){

  const content = document.getElementById('content');

  const section = document.createElement('section');

  section.className = 'category-section';

  section.id = category.id;

  section.innerHTML = `
  
    <h2 class="section-title">${category.title}</h2>

    <div class="products-grid" id="${category.id}-grid"></div>

  `;

  content.appendChild(section);

  const grid = document.getElementById(`${category.id}-grid`);

  for(const file of category.files){

    try{

      const response = await fetch(file);

      const products = await response.json();

      products.forEach(product => {

        const title =
          product.Title ||
          product.title ||
          'Produs';

        const image =
          product.Image ||
          product.image ||
          '';

        const price =
          product.Price ||
          product.price ||
          '';

        const card = document.createElement('div');

        card.className = 'product-card';

        card.innerHTML = `

          <img 
            src="${image}" 
            alt="${title}"
            onerror="this.src='https://via.placeholder.com/500x400?text=MobilaAlex.ro';"
          >

          <div class="product-info">

            <div class="product-title">
              ${title}
            </div>

            <div class="product-price">
              ${price}
            </div>

            <a class="whatsapp-btn"
               href="https://wa.me/40757477926?text=Salut,%20sunt%20interesat%20de%20${encodeURIComponent(title)}">

              Comandă pe WhatsApp

            </a>

          </div>

        `;

        grid.appendChild(card);

      });

    }catch(error){

      console.log('Eroare:',file);

    }

  }

}

categories.forEach(category => {

  loadCategory(category);

});

</script>
