<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MobilaAlex.ro</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Poppins',sans-serif;
      background:#f5f5f5;
      color:#111;
    }

    header{
      background:#111;
      color:white;
      padding:20px 5%;
      display:flex;
      justify-content:space-between;
      align-items:center;
      position:sticky;
      top:0;
      z-index:999;
    }

    .logo{
      font-size:28px;
      font-weight:700;
    }

    .logo span{
      color:#d4af37;
    }

    nav a{
      color:white;
      text-decoration:none;
      margin-left:20px;
      transition:0.3s;
    }

    nav a:hover{
      color:#d4af37;
    }

    .hero{
      height:90vh;
      background:
      linear-gradient(rgba(0,0,0,0.45),rgba(0,0,0,0.45)),
      url('https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?q=80&w=1600&auto=format&fit=crop')
      center/cover;

      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      color:white;
      padding:40px;
    }

    .hero-content{
      max-width:850px;
    }

    .hero h1{
      font-size:64px;
      margin-bottom:20px;
    }

    .hero p{
      font-size:20px;
      line-height:1.7;
      margin-bottom:35px;
    }

    .btn{
      display:inline-block;
      padding:16px 32px;
      border-radius:50px;
      text-decoration:none;
      font-weight:600;
      transition:0.3s;
      margin:10px;
    }

    .btn-primary{
      background:#d4af37;
      color:black;
    }

    .btn-primary:hover{
      transform:translateY(-3px);
    }

    .btn-secondary{
      border:1px solid rgba(255,255,255,0.3);
      color:white;
      background:rgba(255,255,255,0.08);
    }

    .btn-secondary:hover{
      background:rgba(255,255,255,0.15);
    }

    section{
      padding:80px 5%;
    }

    .section-title{
      text-align:center;
      font-size:42px;
      margin-bottom:50px;
    }

    .products{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:30px;
    }

    .product-card{
      background:white;
      border-radius:24px;
      overflow:hidden;
      box-shadow:0 10px 25px rgba(0,0,0,0.08);
      transition:0.3s;
    }

    .product-card:hover{
      transform:translateY(-8px);
    }

    .product-card img{
      width:100%;
      height:260px;
      object-fit:cover;
    }

    .product-info{
      padding:24px;
    }

    .product-info h3{
      font-size:20px;
      margin-bottom:10px;
    }

    .price{
      color:#d4af37;
      font-size:24px;
      font-weight:700;
      margin-bottom:20px;
    }

    .whatsapp-btn{
      width:100%;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:14px;
      background:#25D366;
      color:white;
      text-decoration:none;
      border-radius:50px;
      font-weight:600;
      transition:0.3s;
    }

    .whatsapp-btn:hover{
      background:#1eb95a;
    }

    footer{
      background:#111;
      color:white;
      text-align:center;
      padding:40px;
      margin-top:50px;
    }

    .floating-whatsapp{
      position:fixed;
      right:20px;
      bottom:20px;
      width:65px;
      height:65px;
      background:#25D366;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 10px 25px rgba(0,0,0,0.2);
      z-index:9999;
    }

    .floating-whatsapp img{
      width:34px;
    }

    @media(max-width:768px){

      .hero h1{
        font-size:42px;
      }

      nav{
        display:none;
      }

    }

  </style>

</head>

<body>

<header>

  <div class="logo">
    Mobila<span>Alex</span>.ro
  </div>

  <nav>
    <a href="#products">Produse</a>
    <a href="https://wa.me/40757477926">WhatsApp</a>
  </nav>

</header>

<section class="hero">

  <div class="hero-content">

    <h1>Mobilă Modernă Pentru Casa Ta</h1>

    <p>
      Dormitoare, dulapuri, bucătării, saltele și mobilier premium la prețuri accesibile.
    </p>

    <a href="#products" class="btn btn-primary">
      Vezi Produsele
    </a>

    <a href="https://wa.me/40757477926"
       class="btn btn-secondary">
      Comandă pe WhatsApp
    </a>

  </div>

</section>

<section id="products">

  <h2 class="section-title">
    Produse Populare
  </h2>

  <div class="products" id="products-grid">

  </div>

</section>

<footer>
  © 2026 MobilaAlex.ro • 0757 477 926
</footer>

<a class="floating-whatsapp"
   href="https://wa.me/40757477926">

  <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">

</a>

<script>

async function loadProducts(){

  try{

    const response = await fetch('products.json');
    const products = await response.json();

    const grid = document.getElementById('products-grid');

    products.slice(0,120).forEach(product => {

      const card = document.createElement('div');

      card.className = 'product-card';

      card.innerHTML = `

        <img src="${product.image}" alt="${product.title}">

        <div class="product-info">

          <h3>${product.title}</h3>

          <div class="price">
            ${product.price}
          </div>

          <a class="whatsapp-btn"
             href="https://wa.me/40757477926?text=Salut,%20sunt%20interesat%20de%20${encodeURIComponent(product.title)}">

             Comandă pe WhatsApp

          </a>

        </div>

      `;

      grid.appendChild(card);

    });

  }catch(error){

    console.log(error);

  }

}

loadProducts();

</script>

</body>
</html>
